# docker-compose.yml for production deployment
# Copy this file to your server as docker-compose.yml.
#
# For CI/CD (GHCR): replace smtools:latest with your GHCR image
#   ghcr.io/your-username/smtools:latest
#
# The app port is bound to 127.0.0.1 only — your reverse proxy
# (nginx, Caddy, etc.) should connect to localhost:8080.

services:
  app:
    image: ghcr.io/rivet92/smtools:latest
    container_name: smtools-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:${PORT}
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      AUTHENTICATION__GOOGLE__CLIENTID: ${AUTHENTICATION__GOOGLE__CLIENTID}
      AUTHENTICATION__GOOGLE__CLIENTSECRET: ${AUTHENTICATION__GOOGLE__CLIENTSECRET}
      AUTHENTICATION__GITHUB__CLIENTID: ${AUTHENTICATION__GITHUB__CLIENTID}
      AUTHENTICATION__GITHUB__CLIENTSECRET: ${AUTHENTICATION__GITHUB__CLIENTSECRET}
      PORT: ${PORT}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
    volumes:
      - smtools-avatars:/app/wwwroot/avatars
    depends_on:
      db:
        condition: service_healthy
    networks:
      - smtools-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:17-alpine
    container_name: smtools_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smtools-network

volumes:
  postgres-data:
  smtools-avatars:

networks:
  smtools-network:
    driver: bridge
