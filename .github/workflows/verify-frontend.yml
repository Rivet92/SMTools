name: Verify Frontend

on:
  workflow_call:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # pin@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # pin@v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # pin@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Audit npm dependencies
        run: pnpm --filter frontend audit --audit-level=moderate

      - name: Lint
        run: pnpm --filter frontend lint --max-warnings 0

      - name: Check formatting
        run: pnpm --filter frontend format:check

      - name: Typecheck
        run: pnpm --filter frontend typecheck

      - name: Run tests
        run: pnpm --filter frontend test

      - name: Run tests with coverage
        run: pnpm --filter frontend test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # pin@v7.0.1
        with:
          name: frontend-coverage
          path: frontend/coverage/

      - name: Upload to Codecov
        uses: codecov/codecov-action@f2274c2c340e0c81c8f7dc407b2a477b8935f171  # pin@v6
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: true

      - name: Build
        run: pnpm --filter frontend build
