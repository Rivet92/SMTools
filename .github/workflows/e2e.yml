name: E2E Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: smtools_test
          POSTGRES_USER: smtools
          POSTGRES_PASSWORD: smtools
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # pin@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # pin@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # pin@v4
      - run: pnpm install
      - run: pnpm --filter frontend exec playwright install --with-deps chromium
      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # pin@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore backend
        run: dotnet restore backend/src/SMTools.Api/SMTools.Api.csproj
      - name: Build backend
        run: dotnet build --no-restore backend/src/SMTools.Api/SMTools.Api.csproj
      - name: Start backend
        run: |
          nohup dotnet run --no-build --project backend/src/SMTools.Api/SMTools.Api.csproj > /tmp/backend.log 2>&1 &
          disown
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"
        env:
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=smtools_test;Username=smtools;Password=smtools
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://localhost:5125
      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5125/health/ready > /dev/null 2>&1; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "Backend failed to start"
          echo "--- backend.log ---"
          cat /tmp/backend.log
          exit 1
      - name: Start frontend
        run: |
          nohup pnpm --filter frontend dev > /tmp/frontend.log 2>&1 &
          disown
          echo "FRONTEND_PID=$!" >> "$GITHUB_ENV"
      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "Frontend is ready"
              exit 0
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 2
          done
          echo "Frontend failed to start"
          exit 1
      - run: pnpm --filter frontend test:e2e
      - name: Cleanup
        if: always()
        run: |
          kill ${{ env.BACKEND_PID }} || true
          kill ${{ env.FRONTEND_PID }} || true
