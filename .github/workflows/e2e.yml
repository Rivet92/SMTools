name: E2E Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: smtools_test
          POSTGRES_USER: smtools
          POSTGRES_PASSWORD: smtools
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # pin@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # pin@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # pin@v4
        with:
          version: 9
      - run: pnpm install
      - run: pnpm exec playwright install --with-deps chromium
      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68  # pin@v6.0.0
        with:
          dotnet-version: '10.0.x'
      - run: pnpm test:e2e
        env:
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=smtools_test;Username=smtools;Password=smtools
          ASPNETCORE_ENVIRONMENT: Development
